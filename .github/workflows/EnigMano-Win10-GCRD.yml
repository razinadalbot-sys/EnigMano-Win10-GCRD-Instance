name: "Windows Cloud PC (Full Setup)"

on:
  workflow_dispatch:
    inputs:
      CODE:
        description: "Full headless command from https://remotedesktop.google.com/headless (Windows CMD version)"
        required: true
      PIN:
        description: "CRD PIN (6+ digits). Default 123456"
        required: false
        default: "123456"

concurrency:
  group: crd-register-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  crd-setup:
    name: "🚀 Windows 2022 CRD Runner"
    runs-on: windows-2022

    env:
      RAW_CODE: ${{ github.event.inputs.CODE }}
      PIN_INPUT: ${{ github.event.inputs.PIN }}

    defaults:
      run:
        shell: pwsh

    steps:
      - name: "🔧 Download & Install Software"
        run: |
          $ErrorActionPreference = 'Stop'
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          if (-not (Test-Path $userDownloads)) { New-Item -ItemType Directory -Path $userDownloads | Out-Null }
          
          # 1. Download Files
          Write-Host "Downloading Chrome Remote Desktop..."
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "$userDownloads\crdhost.msi" -UseBasicParsing
          
          Write-Host "Downloading Node.js..."
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v24.11.0/node-v24.11.0-x64.msi" -OutFile "$userDownloads\node-v24.msi" -UseBasicParsing
          
          Write-Host "Downloading VS Code..."
          Invoke-WebRequest -Uri "https://code.visualstudio.com/sha/download?build=stable&os=win32-x64-user" -OutFile "$userDownloads\VisualStudio.exe" -UseBasicParsing

          # 2. Install Files Silently
          Write-Host "Installing Chrome Remote Desktop..."
          Start-Process -Wait -FilePath "msiexec.exe" -ArgumentList "/i `"$userDownloads\crdhost.msi`" /qn /norestart"
          
          Write-Host "Installing Node.js..."
          Start-Process -Wait -FilePath "msiexec.exe" -ArgumentList "/i `"$userDownloads\node-v24.msi`" /qn /norestart"

          Write-Host "Installing VS Code..."
          Start-Process -Wait -FilePath "$userDownloads\VisualStudio.exe" -ArgumentList "/verysilent /mergetasks=!runcode"
          
          Write-Host "✅ All software installed."

      - name: "🌟 Start Chrome Remote Desktop"
        run: |
          Write-Host "Executing Google Headless Code..."
          # Append the PIN to the headless command provided by the user
          $crdCommand = "$env:RAW_CODE --pin=$env:PIN_INPUT"
          
          try {
              cmd.exe /c $crdCommand
              Write-Host "✅ Chrome Remote Desktop started successfully!"
          } catch {
              Write-Error "❌ Failed to start CRD: $($_.Exception.Message)"
          }

      - name: "⏳ Keep Runner Alive"
        run: |
          Write-Host "==============================================="
          Write-Host "💻 Your Cloud PC is ready!"
          Write-Host "🔗 Go to: https://remotedesktop.google.com/access"
          Write-Host "⏳ Keeping the server alive for up to 6 hours..."
          Write-Host "==============================================="
          
          # Infinite loop to keep the GitHub Actions runner active
          while ($true) { 
              Start-Sleep -Seconds 300 
          }
